version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-hotel_management}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./hotel_management.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hotel_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hotel_backend
    restart: always
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
