name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: hotel_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hotel_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed database
        env:
          PGPASSWORD: root
        run: psql -h 127.0.0.1 -U postgres -d hotel_management -f hotel_management.sql

      - name: Build Docker image
        run: docker build -t hotel-api-ci .

      - name: Start API server
        env:
          PORT: 5000
          DB_USER: postgres
          DB_HOST: 127.0.0.1
          DB_NAME: hotel_management
          DB_PASSWORD: root
          DB_PORT: 5432
          JWT_SECRET: ci-test-secret
          EMAIL_USER: ci@example.com
          EMAIL_PASS: not-used-in-ci
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:5000/ > root.json; then
              node -e "const fs=require('fs'); const body=JSON.parse(fs.readFileSync('root.json','utf8')); if(body.status !== 'Running') throw new Error('Unexpected root response'); console.log(body.message);"
              exit 0
            fi
            sleep 3
          done
          echo "API did not become ready in time."
          exit 1

      - name: Smoke test DB-backed endpoint
        run: |
          curl --fail --silent http://127.0.0.1:5000/api/rooms > rooms.json
          node -e "const fs=require('fs'); const body=JSON.parse(fs.readFileSync('rooms.json','utf8')); if(!Array.isArray(body)) throw new Error('Expected rooms array'); console.log('rooms=' + body.length);"

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
