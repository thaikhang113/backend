name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_name}:sha-${GITHUB_SHA}"
          {
            echo "tags<<EOF"
            echo "${image_ref}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${image_name}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}

  deploy-vps:
    needs: publish-image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency: production-deploy
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Check deploy secrets
        id: deploy-check
        shell: bash
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY DEPLOY_COMMAND; do
            if [ -z "${!name}" ]; then
              echo "Missing ${name}"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.deploy-check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Execute remote deployment
        if: steps.deploy-check.outputs.should_deploy == 'true'
        shell: bash
        run: |
          {
            echo "set -e"
            printf 'export IMAGE=%q\n' "${{ needs.publish-image.outputs.image_ref }}"
            printf 'export VERSION=%q\n' "${GITHUB_SHA}"
            if [ -n "$GHCR_USERNAME" ]; then
              printf 'export GHCR_USERNAME=%q\n' "${GHCR_USERNAME}"
            fi
            if [ -n "$GHCR_TOKEN" ]; then
              printf 'export GHCR_TOKEN=%q\n' "${GHCR_TOKEN}"
            fi
            printf '%s\n' "$DEPLOY_COMMAND"
          } > deploy.remote.sh

          ssh -i ~/.ssh/id_ed25519 -p "${VPS_PORT:-22}" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" 'bash -s' < deploy.remote.sh

      - name: Deployment skipped
        if: steps.deploy-check.outputs.should_deploy != 'true'
        run: echo "Image was published. Add production environment secrets VPS_HOST, VPS_USER, VPS_SSH_KEY and DEPLOY_COMMAND to enable VPS deployment."
